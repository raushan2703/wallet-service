databaseChangeLog:
  - changeSet:
      id: 001-create-wallet-table
      author: developer
      changes:
        - createTable:
            tableName: wallet
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: balance
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - sql:
            sql: ALTER TABLE wallet ADD CONSTRAINT chk_balance_non_negative CHECK (balance >= 0)
